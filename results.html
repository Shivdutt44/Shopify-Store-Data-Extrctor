<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify Data Extractor - Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="results.css">
</head>
<body>
    <div class="results-container">
        <div class="results-header">
            <div class="logo">
                <i class="fas fa-store-alt"></i>
                <span>Shopify Data Extractor</span>
            </div>
            <div class="store-url" id="storeUrlDisplay"></div>
            <button class="btn-download" id="downloadAllBtn">
                <i class="fas fa-download"></i>
                Download All
            </button>
        </div>
        
        <div class="tabs-container">
            <div class="tabs-scroll">
                <button class="tab-scroll-btn prev" id="prevTabBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                
                <div class="tabs-wrapper" id="tabsWrapper">
                    <div class="tabs" id="tabs"></div>
                </div>
                
                <button class="tab-scroll-btn next" id="nextTabBtn">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
        
        <div class="tab-content" id="tabContent">
            <div class="empty-state">
                <div class="empty-icon">
                    <i class="fas fa-box-open"></i>
                </div>
                <p>Select a collection to view products</p>
            </div>
        </div>
    </div>

    <script src="results.js"></script>
</body>
</html>

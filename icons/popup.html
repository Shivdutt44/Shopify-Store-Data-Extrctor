<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify Data Extractor | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-store-alt"></i>
                <span>Shopify Data Extractor</span>
            </div>
            <div class="tagline">Premium eCommerce Data Extraction Tool</div>
            <div class="current-store">
                <i class="fas fa-link"></i>
                <span id="storeUrlDisplay">Navigate to a Shopify store</span>
            </div>
        </div>
        
        <div class="main-content">
            <div class="progress-section">
                <div class="progress-title">Extracting Store Data</div>
                <div class="circular-progress">
                    <svg class="progress-ring" width="100" height="100">
                        <circle class="progress-ring-circle" stroke="url(#gradient)" stroke-width="4" fill="transparent" r="45" cx="50" cy="50"/>
                    </svg>
                    <svg width="0" height="0">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#8b5cf6" />
                                <stop offset="100%" stop-color="#6366f1" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="inner-circle">
                        <div class="percentage">0%</div>
                    </div>
                </div>
                <div class="progress-message" id="progressMessage">Ready to extract data</div>
                
                <div class="stats-section">
                    <div class="stat-card">
                        <div class="stat-value">
                            <i class="fas fa-layer-group"></i>
                            <span id="collectionsCount">0</span>
                        </div>
                        <div class="stat-label">Collections</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">
                            <i class="fas fa-cubes"></i>
                            <span id="productsCount">0</span>
                        </div>
                        <div class="stat-label">Products</div>
                    </div>
                </div>
            </div>
            
            <div class="results-section">
                <div class="section-title">
                    <i class="fas fa-database"></i>
                    <span>Extraction Results</span>
                </div>
                
                <div class="collection-selector" id="collectionSelector" style="display: none;">
                    <select id="collectionSelect">
                        <option value="all">All Collections (All Products)</option>
                    </select>
                    <div class="collection-info" id="collectionInfo">Select a collection to filter products</div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-view" id="viewResultsBtn" disabled>
                        <i class="fas fa-eye"></i>
                        <span>View Results</span>
                    </button>
                    <button class="btn btn-success" id="downloadBtn" disabled>
                        <i class="fas fa-file-csv"></i>
                        <span>Download CSV</span>
                    </button>
                    <button class="btn" id="extractBtn">
                        <i class="fas fa-bolt"></i>
                        <span>Extract Data</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2023 Shopify Data Extractor | Premium Tool</p>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
